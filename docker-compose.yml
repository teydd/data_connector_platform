version: "3.9"

services:
  # Django backend
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media_files:/app/media
    environment:
      - DATABASE_URL=postgresql://postgres:password@app_db:5432/appdb
      - SECRET_KEY=change-me-in-production
      - DEBUG=True
    depends_on:
      - app_db
    networks:
      - app_network

  # Frontend (Next.js in root)
  frontend:
    build: .
    ports:
      - "3001:3000"
    volumes:
      - .:/app
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - app_network

  # App Database (Postgres)
  app_db:
    image: postgres:15
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - app_db_data:/var/lib/postgresql/data
    networks:
      - app_network

volumes:
  app_db_data:
  media_files:

networks:
  app_network:
    driver: bridge
